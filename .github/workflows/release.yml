name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Cross-compile
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o vorpal ./cmd/vorpal
          tar -czf vorpal-${VERSION}-darwin-arm64.tar.gz vorpal
          rm vorpal

          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o vorpal ./cmd/vorpal
          tar -czf vorpal-${VERSION}-darwin-amd64.tar.gz vorpal
          rm vorpal

          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o vorpal ./cmd/vorpal
          tar -czf vorpal-${VERSION}-linux-amd64.tar.gz vorpal
          rm vorpal

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: vorpal-*.tar.gz
